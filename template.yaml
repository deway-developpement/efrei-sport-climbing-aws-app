AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  efrei-sport-climbing-aws-app
  Sample SAM Template for efrei-sport-climbing-aws-app

Parameters:
  EnvironmentName:
    Type: String
    Default: test
    AllowedValues:
      - test
      - prod

Conditions:
  IsTestEnvironment: !Equals [!Ref EnvironmentName, test]

Mappings:
  EnvironmentConfig:
    test:
      S3BucketName: efrei-sport-climbing-app-test-data-v2
    prod:
      S3BucketName: efrei-sport-climbing-app-data

Globals:
  Function:
    Timeout: 3
    MemorySize: 1024
    Tracing: Active
  Api:
    TracingEnabled: true
Resources:
  DiscordEventHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/discord_event_handler/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Timeout: 10
      Architectures:
        - arm64
      Events:
        Discord:
          Type: Api
          Properties:
            Path: /discord-event-handler
            Method: post
      Environment:
        Variables:
          DISCORD_APP_ID: '1372127887096025181'
          PUBLIC_KEY: '8605d1e852a3a665e53ce2cacced91e87a237a621855adfdbf69aeaba2ac4a65'
          DISCORD_ROLE_ID: '1372130966935572500'
          DISCORD_ROLE_ADMIN_ID: '1372131016591933551'
          GUILD_ID: '1371519432190333059'
          ANTREBLOC_CHANNEL: '1371521997594689547'
          CLIMBUP_CHANNEL: '1371522019254075412'
          CLIMBUP_BORDEAUX_CHANNEL: '1371522048303562872'
          ALGOLIA_SECRET_PATH: Efrei-Sport-Climbing-App/secrets/algolia
          ALGOLIA_SESSIONS_INDEX: esc_sessions
          SESSION_RECOMMENDATIONS_TABLE_NAME: !Ref SessionRecommendationsTable
          S3_BUCKET_NAME: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DiscordBotTokenSecret
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref HelloAssoClientSecret
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AlgoliaSecret
        - S3ReadPolicy:
            BucketName: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
      Layers:
        - !Ref LayerCommons
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: !If [IsTestEnvironment, true, false]
        EntryPoints:
          - app.ts
        External:
          - commons
          - aws-sdk
  DiscordGarbageCollector:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/discord_garbage_collector/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Timeout: 15
      Architectures:
        - arm64
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 0 * * ? *)
            Name: DiscordGarbageCollectorSchedule
            Description: Schedule removing old session in channel
            Enabled: true
      Environment:
        Variables:
          PUBLIC_KEY: 8605d1e852a3a665e53ce2cacced91e87a237a621855adfdbf69aeaba2ac4a65
          ALGOLIA_SECRET_PATH: Efrei-Sport-Climbing-App/secrets/algolia
          ANTREBLOC_CHANNEL: '1371521997594689547'
          CLIMBUP_CHANNEL: '1371522019254075412'
          CLIMBUP_BORDEAUX_CHANNEL: '1371522048303562872'
          S3_BUCKET_NAME: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DiscordBotTokenSecret
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AlgoliaSecret
      Layers:
        - !Ref LayerCommons
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: !If [IsTestEnvironment, true, false]
        EntryPoints:
          - app.ts
        External:
          - commons
          - aws-sdk
  HelloAssoEventHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/helloasso_event_handler/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Timeout: 5
      Architectures:
        - arm64
      Events:
        Discord:
          Type: Api
          Properties:
            Path: /helloasso-event-handler
            Method: post
      Environment:
        Variables:
          DISCORD_ROLE_ID: '1372130966935572500'
          GUILD_ID: '1371519432190333059'
          S3_BUCKET_NAME: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DiscordBotTokenSecret
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref HelloAssoClientSecret
        - S3ReadPolicy:
            BucketName: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
      Layers:
        - !Ref LayerCommons
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: !If [IsTestEnvironment, true, false]
        EntryPoints:
          - app.ts
        External:
          - commons
          - aws-sdk
  TicketsRegistorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/tickets_registor/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Architectures:
        - arm64
      Environment:
        Variables:
          S3_BUCKET_NAME: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
      Events:
        S3Event:
          Type: S3
          Properties:
            Bucket: !Ref EfreiSportClimbingBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: tickets/climb-up/
                  - Name: suffix
                    Value: pdf
        S3EventSuppression:
          Type: S3
          Properties:
            Bucket: !Ref EfreiSportClimbingBucket
            Events: s3:ObjectRemoved:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: tickets/climb-up/
                  - Name: suffix
                    Value: pdf
      Policies:
        - AmazonDynamoDBFullAccess
        - S3ReadPolicy:
            BucketName: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
      Layers:
        - !Ref LayerCommons
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: !If [IsTestEnvironment, true, false]
        EntryPoints:
          - app.ts
        External:
          - commons
          - aws-sdk
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.users
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
  AlgoliaUsersIndexerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/algolia_users_indexer/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Timeout: 10
      Architectures:
        - arm64
      Events:
        UsersStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt UsersTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            Enabled: true
        UserStatsStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt UserStatsTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            Enabled: true
      Environment:
        Variables:
          ALGOLIA_SECRET_PATH: Efrei-Sport-Climbing-App/secrets/algolia
          ALGOLIA_USERS_INDEX: esc_users
          USER_STATS_TABLE_NAME: !Ref UserStatsTable
      Policies:
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref AlgoliaSecret
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref UserStatsTable
      Layers:
        - !Ref LayerCommons
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: !If [IsTestEnvironment, true, false]
        EntryPoints:
          - app.ts
        External:
          - commons
          - aws-sdk
  WeeklySessionRecommenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/weekly_session_recommender/
      Handler: app.lambdaHandler
      Runtime: nodejs22.x
      Timeout: 60
      Architectures:
        - arm64
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 16 ? * MON *)
            Name: WeeklySessionRecommenderSchedule
            Description: Weekly Discord DM session recommendations
            Enabled: true
      Environment:
        Variables:
          GUILD_ID: '1371519432190333059'
          ANTREBLOC_CHANNEL: '1371521997594689547'
          CLIMBUP_CHANNEL: '1371522019254075412'
          CLIMBUP_BORDEAUX_CHANNEL: '1371522048303562872'
          SESSION_RECOMMENDATIONS_TABLE_NAME: !Ref SessionRecommendationsTable
          WEEKLY_RECOMMENDER_TARGET_USER_ID: '315852341620244491'
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref UserStatsTable
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionRecommendationsTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DiscordBotTokenSecret
      Layers:
        - !Ref LayerCommons
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: !If [IsTestEnvironment, true, false]
        EntryPoints:
          - app.ts
        External:
          - commons
          - aws-sdk
  SessionRecommendationReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/weekly_session_recommender/
      Handler: app.reminderLambdaHandler
      Runtime: nodejs22.x
      Timeout: 60
      Architectures:
        - arm64
      Events:
        ReminderSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: SessionRecommendationReminderSchedule
            Description: Sends pending Discord DM recommendation reminders
            Enabled: true
      Environment:
        Variables:
          SESSION_RECOMMENDATIONS_TABLE_NAME: !Ref SessionRecommendationsTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionRecommendationsTable
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref DiscordBotTokenSecret
      Layers:
        - !Ref LayerCommons
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: !If [IsTestEnvironment, true, false]
        EntryPoints:
          - app.ts
        External:
          - commons
          - aws-sdk
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.sessions
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: sortId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: sortId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  UserStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.user-stats
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
  SessionRecommendationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.session-recommendations
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: sortId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: sortId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
  DmConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.dm-conversations
      AttributeDefinitions:
        - AttributeName: discordUserId
          AttributeType: S
      KeySchema:
        - AttributeName: discordUserId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
  UserCalendarFeedsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.user-calendar-feeds
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  AssociationAnnouncementsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.association-announcements
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.tickets
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
        - AttributeName: orderId
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
  IssuesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Efrei-Sport-Climbing-App.issues
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  LayerCommons:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: layers/commons/
      CompatibleRuntimes:
        - nodejs22.x
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: makefile
  EfreiSportClimbingBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: !FindInMap [EnvironmentConfig, !Ref EnvironmentName, S3BucketName]
  DiscordBotTokenSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    Properties:
      Name: Efrei-Sport-Climbing-App/secrets/discord_bot_token
      Description: Discord Bot Token
  HelloAssoClientSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: Efrei-Sport-Climbing-App/secrets/helloasso_client_secret
      Description: HelloAsso Api Client Id and Secret
  AlgoliaSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: Efrei-Sport-Climbing-App/secrets/algolia
      Description: Algolia Application ID and Admin API Key
  UsersTableBackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: Efrei-Sport-Climbing-App/users
        BackupPlanRule:
          - RuleName: WeeklyBackupRule
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 0 ? * 6 *)
            StartWindowMinutes: 60
            CompletionWindowMinutes: 10080
            Lifecycle:
              MoveToColdStorageAfterDays: 30
              DeleteAfterDays: 1095
  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: Efrei-Sport-Climbing-App-Backup-Vault
      BackupVaultTags:
        BackupVaultName: Efrei-Sport-Climbing-App-Backup-Vault
  UsersTableBackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: UsersTableBackupRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - backup.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: UsersTableBackupPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:ListBackups
                  - dynamodb:CreateBackup
                  - dynamodb:DeleteBackup
                  - dynamodb:RestoreTableFromBackup
                Resource: '*'
Outputs:
  DiscordEventHandlerApi:
    Description: API Gateway endpoint URL for Prod stage for Discord Event Handler function
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/discord-event-handler/
  DiscordEventHandlerFunction:
    Description: Discord Event Handler Lambda Function ARN
    Value: !GetAtt DiscordEventHandlerFunction.Arn
  DiscordEventHandlerFunctionIamRole:
    Description: Implicit IAM Role created for Discord Event Handler function
    Value: !GetAtt DiscordEventHandlerFunctionRole.Arn
  HelloAssoEventHandlerApi:
    Description: API Gateway endpoint URL for Prod stage for Hello Asso Event Handler function
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/helloasso-event-handler/
  HelloAssoEventHandlerFunction:
    Description: Hello Asso Event Handler Lambda Function ARN
    Value: !GetAtt HelloAssoEventHandlerFunction.Arn
  HelloAssoEventHandlerFunctionIamRole:
    Description: Implicit IAM Role created for Hello Asso Event Handler function
    Value: !GetAtt HelloAssoEventHandlerFunctionRole.Arn
  Users:
    Description: Table for users of the association
    Value: !Ref UsersTable
  Sessions:
    Description: Table for sessions of the bot
    Value: !Ref SessionsTable
  UserStats:
    Description: Table for computed user statistics used for Algolia enrichment
    Value: !Ref UserStatsTable
  SessionRecommendations:
    Description: Table for session recommendation delivery and attribution
    Value: !Ref SessionRecommendationsTable
  DmConversations:
    Description: Table for Discord DM conversation state
    Value: !Ref DmConversationsTable
  UserCalendarFeeds:
    Description: Table for saved user calendar feed URLs
    Value: !Ref UserCalendarFeedsTable
  AssociationAnnouncements:
    Description: Table for association announcements injected into the DM worker context
    Value: !Ref AssociationAnnouncementsTable
  Tickets:
    Description: Table for tickets of the association
    Value: !Ref TicketsTable
  Issues:
    Description: Table for issues of the association
    Value: !Ref IssuesTable
  AlgoliaUsersIndexerFunction:
    Description: Lambda Function ARN for Algolia user indexing
    Value: !GetAtt AlgoliaUsersIndexerFunction.Arn
